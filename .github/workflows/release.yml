name: Release

on:
  push:
    branches:
      - '**'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # create releases + push tags
  packages: write   # push images to GHCR

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}
      prerelease: ${{ steps.v.outputs.prerelease }}
      branch_slug: ${{ steps.v.outputs.branch_slug }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and tag
        id: v
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
          BRANCH="${GITHUB_REF_NAME}"
          BRANCH_SLUG=$(echo "$BRANCH" | tr '/' '-' | tr -c '[:alnum:]-_.' '-' | sed 's/-*$//')

          if [ "$BRANCH" = "main" ]; then
            TAG="v${VERSION}"
            PRERELEASE="false"
          else
            TAG="v${VERSION}-${BRANCH_SLUG}.${GITHUB_RUN_NUMBER}"
            PRERELEASE="true"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION tag=$TAG prerelease=$PRERELEASE"

      - name: Ensure tag is fresh (main only)
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          if git rev-parse "refs/tags/${{ steps.v.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.v.outputs.tag }} already exists. Bump <Version> in Directory.Build.props before merging to main."
            exit 1
          fi

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            archive: zip
          - rid: linux-x64
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish ${{ matrix.rid }} (self-contained, single-file)
        run: |
          dotnet publish BlazeCannon.App/BlazeCannon.App.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./publish/${{ matrix.rid }}

      - name: Package archive
        shell: bash
        env:
          TAG: ${{ needs.version.outputs.tag }}
          RID: ${{ matrix.rid }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          NAME="blazecannon-${TAG}-${RID}"
          cd publish
          if [ "$ARCHIVE" = "zip" ]; then
            zip -r "../${NAME}.zip" "${RID}"
          else
            tar -czf "../${NAME}.tar.gz" "${RID}"
          fi
          ls -la ../${NAME}.*

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.rid }}
          path: blazecannon-${{ needs.version.outputs.tag }}-${{ matrix.rid }}.*
          if-no-files-found: error

  docker:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Compute Docker tags
        id: dt
        shell: bash
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/blazecannon"
          TAGS="${IMAGE}:${{ needs.version.outputs.tag }}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE}:latest,${IMAGE}:${{ needs.version.outputs.version }}"
          else
            TAGS="${TAGS},${IMAGE}:${{ needs.version.outputs.branch_slug }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.dt.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.version.outputs.tag }}

  release:
    needs: [version, build, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List collected artifacts
        run: ls -la artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.version.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/*
