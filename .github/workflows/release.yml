name: Release

on:
  push:
    branches:
      - '**'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # create releases + push tags
  packages: write   # push images to GHCR

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}
      prerelease: ${{ steps.v.outputs.prerelease }}
      branch_slug: ${{ steps.v.outputs.branch_slug }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and tag
        id: v
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
          BRANCH="${GITHUB_REF_NAME}"
          BRANCH_SLUG=$(echo "$BRANCH" | tr '/' '-' | tr -c '[:alnum:]-_.' '-' | sed 's/-*$//')

          if [ "$BRANCH" = "main" ]; then
            TAG="v${VERSION}"
            PRERELEASE="false"
          else
            TAG="v${VERSION}-${BRANCH_SLUG}.${GITHUB_RUN_NUMBER}"
            PRERELEASE="true"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION tag=$TAG prerelease=$PRERELEASE"

      - name: Ensure tag is fresh (main only)
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          if git rev-parse "refs/tags/${{ steps.v.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.v.outputs.tag }} already exists. Bump <Version> in Directory.Build.props before merging to main."
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          if [ ! -f CHANGELOG.md ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          # Strip leading blank lines
          sed -i '/./,$!d' release-notes.md

          if [ -s release-notes.md ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "---- Extracted release notes for $VERSION ----"
            cat release-notes.md
            echo "-----------------------------------------------"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG.md section found for [$VERSION]"
          fi

      - name: Enforce CHANGELOG entry on main
        if: github.ref == 'refs/heads/main' && steps.notes.outputs.exists != 'true'
        shell: bash
        run: |
          echo "::error::No '## [${{ steps.v.outputs.version }}]' section found in CHANGELOG.md. Add one before merging to main."
          exit 1

      - name: Upload release notes artifact
        if: steps.notes.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            binary: BlazeCannon.Api.exe
            package: exe
          - rid: linux-x64
            binary: BlazeCannon.Api
            package: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish ${{ matrix.rid }} (fully embedded single-file)
        run: |
          dotnet publish BlazeCannon.Api/BlazeCannon.Api.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:IncludeAllContentForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o ./publish/${{ matrix.rid }}

      - name: Package release asset
        shell: bash
        env:
          TAG: ${{ needs.version.outputs.tag }}
          RID: ${{ matrix.rid }}
          PACKAGE: ${{ matrix.package }}
          BIN: ${{ matrix.binary }}
        run: |
          set -euo pipefail
          NAME="blazecannon-${TAG}-${RID}"
          cd publish/${RID}
          if [ "$PACKAGE" = "exe" ]; then
            # Windows: rename the single-file exe — no archive needed
            cp "${BIN}" "../../${NAME}.exe"
          else
            # Linux: wrap in tar.gz so the +x bit survives a GitHub download
            chmod +x "${BIN}"
            tar -czf "../../${NAME}.tar.gz" "${BIN}"
          fi
          ls -la ../../${NAME}*

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.rid }}
          path: blazecannon-${{ needs.version.outputs.tag }}-${{ matrix.rid }}.*
          if-no-files-found: error

  docker:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Compute Docker tags
        id: dt
        shell: bash
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/blazecannon"
          TAGS="${IMAGE}:${{ needs.version.outputs.tag }}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${IMAGE}:latest,${IMAGE}:${{ needs.version.outputs.version }}"
          else
            TAGS="${TAGS},${IMAGE}:${{ needs.version.outputs.branch_slug }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.dt.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.version.outputs.tag }}

  release:
    needs: [version, build, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: artifacts
          merge-multiple: true

      - name: Download release notes (if present)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: notes

      - name: Resolve release body source
        id: body
        shell: bash
        run: |
          if [ -f notes/release-notes.md ] && [ -s notes/release-notes.md ]; then
            echo "body_path=notes/release-notes.md" >> "$GITHUB_OUTPUT"
          else
            echo "body_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: List collected artifacts
        run: ls -la artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.version.outputs.prerelease == 'true' }}
          body_path: ${{ steps.body.outputs.body_path }}
          generate_release_notes: ${{ steps.body.outputs.body_path == '' }}
          files: |
            artifacts/*
